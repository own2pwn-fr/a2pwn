name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (with all provider extras + dev)
        run: uv sync --extra all --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        # burpwn and live model backends are not present in CI; the suite runs fully
        # against fakes, so it must be green without them.
        run: uv run pytest -q

      - name: Skill index builds
        run: uv run python skills/build_index.py
